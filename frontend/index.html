<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LinguaBridge</title>
  <style>
    body {
      font-family: sans-serif;
      max-width: 600px;
      margin: 40px auto;
      padding: 0 16px;
      background: #f5f5f5;
      color: #222;
    }
    h1 { margin-bottom: 8px; }
    .lang-badge {
      display: inline-block;
      background: #1a73e8;
      color: #fff;
      padding: 4px 12px;
      border-radius: 12px;
      font-size: 0.9rem;
      margin-bottom: 24px;
    }
    .card {
      background: #fff;
      border-radius: 8px;
      padding: 20px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.12);
      margin-bottom: 16px;
    }
    label { display: block; margin-bottom: 4px; font-weight: bold; }
    select, button {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #ccc;
      border-radius: 6px;
      font-size: 1rem;
      margin-bottom: 12px;
    }
    button {
      background: #1a73e8;
      color: #fff;
      border: none;
      cursor: pointer;
    }
    button:hover { background: #1558b0; }
    #status {
      margin-top: 8px;
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 0.95rem;
    }
    .status-granted  { background: #d4edda; color: #155724; }
    .status-denied   { background: #f8d7da; color: #721c24; }
    .status-waiting  { background: #fff3cd; color: #856404; }
    #sink-support-msg { color: #888; font-size: 0.85rem; margin-top: -8px; }
    .btn-row { display: flex; gap: 8px; }
    .btn-row button { flex: 1; }
    button:disabled { background: #9ab5e0; cursor: not-allowed; }
    .counters { font-size: 0.9rem; color: #444; margin-top: 4px; }
    .counters p { margin: 4px 0; }
    .counters span { font-weight: bold; color: #1a73e8; }

    /* ── Transcript display ─────────────────────────────────────────── */
    #transcript-box {
      min-height: 80px;
      background: #f9f9f9;
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 10px 12px;
      font-size: 1rem;
      line-height: 1.5;
      margin-top: 8px;
      word-wrap: break-word;
    }
    /* Final transcript text */
    #transcript-final {
      color: #222;
    }
    /* Interim (partial) text shown in a lighter colour */
    #transcript-interim {
      color: #888;
      font-style: italic;
    }
    #transcript-placeholder {
      color: #bbb;
      font-style: italic;
    }

    /* ── Translation display ────────────────────────────────────────── */
    #translation-box {
      min-height: 60px;
      background: #f0f7ff;
      border: 1px solid #c3daf9;
      border-radius: 6px;
      padding: 10px 12px;
      font-size: 1rem;
      line-height: 1.6;
      margin-top: 8px;
      word-wrap: break-word;
    }
    #translation-placeholder {
      color: #bbb;
      font-style: italic;
    }
    /* Each original/translated pair */
    #translation-log p {
      margin: 2px 0;
    }
    .translation-original {
      color: #444;
    }
    .translation-translated {
      color: #1a73e8;
      font-weight: bold;
      margin-bottom: 8px !important;
    }
  </style>
</head>
<body>
  <h1>LinguaBridge</h1>
  <span class="lang-badge">English ↔ German</span>

  <div class="card">
    <button id="btn-mic">Enable Microphone</button>
    <div id="status" class="status-waiting">Mic: waiting for permission…</div>
  </div>

  <div class="card">
    <div id="detected-lang-bar" style="display:none; margin-bottom:12px; font-size:0.95rem; color:#444;">
      Detected language: <strong id="detected-lang-value" style="color:#1a73e8;">—</strong>
    </div>
    <div class="btn-row">
      <button id="btn-start" disabled>Start Streaming</button>
      <button id="btn-stop"  disabled>Stop Streaming</button>
    </div>
    <div id="ws-status"     class="status-waiting" style="margin-top:8px">WS: disconnected</div>
    <div id="stream-status" class="status-waiting" style="margin-top:4px">Streaming: off</div>
    <div class="counters">
      <p>Chunks sent: <span id="cnt-chunks">0</span></p>
      <p>Bytes sent: <span id="cnt-bytes">0</span></p>
    </div>
  </div>

  <!-- Live transcript panel -->
  <div class="card">
    <label>Live Transcript</label>
    <div id="transcript-box" role="log" aria-live="polite" aria-label="Live transcript">
      <span id="transcript-final"></span><span id="transcript-interim"></span><span id="transcript-placeholder">Start streaming to see live transcription here…</span>
    </div>
  </div>

  <!-- Translation panel (PR 4) -->
  <div class="card">
    <label>Translation (EN ↔ DE)</label>
    <div id="translation-box" role="log" aria-live="polite" aria-label="Translation output">
      <span id="translation-placeholder">Translations will appear here after each spoken sentence…</span>
      <div id="translation-log"></div>
    </div>
  </div>

  <div class="card">
    <label for="select-input">Audio Input Device (Microphone)</label>
    <select id="select-input">
      <option value="">— click "Enable Microphone" first —</option>
    </select>

    <label for="select-output">Audio Output Device (Speaker / Headphones)</label>
    <select id="select-output">
      <option value="">— click "Enable Microphone" first —</option>
    </select>
    <p id="sink-support-msg"></p>
  </div>

  <!-- Load the application logic -->
  <script src="app.js"></script>
</body>
</html>
